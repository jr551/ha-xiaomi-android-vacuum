skip:
  name: Skip a scheduled litter-box cleanup
  description: >-
    Mark one exact bridge-correlated Sui job as skipped. This is intended for
    the trusted family-reaction bridge or an explicit local automation.
  fields:
    entry_id:
      name: Sui entry ID
      required: true
      selector:
        text:
    job_id:
      name: Sui job ID
      required: true
      selector:
        text:
    reaction_event_id:
      name: Reaction event ID
      required: true
      selector:
        text:
    reaction:
      name: Skip reaction
      required: true
      selector:
        text:

configure_litter_zone:
  name: Configure the fixed litter-box zone
  description: >-
    Persist one bounded native Dreame rectangle for Sui. Motion remains
    fail-closed unless the exact rectangle is explicitly approved.
  fields:
    entry_id:
      name: Sui entry ID
      required: true
      selector:
        text:
    litter_zone:
      name: Native Dreame rectangle
      required: true
      example: "[600, -2100, 2300, -800]"
      selector:
        object:
    litter_zone_approved:
      name: Rectangle visually approved
      required: true
      selector:
        boolean:
